name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-formulas:
    name: lint-formulas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate formula Ruby syntax
        run: |
          fail=0
          shopt -s nullglob
          for f in Formula/*.rb; do
            echo "ruby -c $f"
            if ! ruby -c "$f" >/dev/null 2>&1; then
              echo "::error file=$f::Ruby syntax error"
              fail=1
            fi
          done
          exit $fail

  # Single aggregation check the org-wide ruleset requires as "CI".
  # Goreleaser's direct push to main from release workflows needs this to pass.
  CI:
    name: CI
    runs-on: ubuntu-latest
    needs: [lint-formulas]
    if: always()
    steps:
      - name: Confirm required checks succeeded
        run: |
          if [ "${{ needs.lint-formulas.result }}" != "success" ]; then
            echo "lint-formulas: ${{ needs.lint-formulas.result }}"
            exit 1
          fi
          echo "All required checks passed."
